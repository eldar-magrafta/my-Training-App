<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="My Trainer" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>My Trainer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #1a1a2e;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }
    h1 { font-size: 2.5rem; margin-bottom: 10px; }
    p  { font-size: 1.1rem; color: #aaa; margin-bottom: 40px; }
    .btn {
      background: #e94560;
      color: white;
      border: none;
      padding: 16px 40px;
      border-radius: 50px;
      font-size: 1.1rem;
      cursor: pointer;
      font-weight: bold;
    }
    .btn:active { opacity: 0.8; }
  </style>
</head>
<body>
  <h1>My Trainer 💪</h1>
  <p>Your personal training app</p>
  <button class="btn" onclick="alert('App is working!')">Start Training</button>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
