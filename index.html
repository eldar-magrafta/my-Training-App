<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0f1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="My Trainer" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>My Trainer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #0f0f1a;
      --card: #1a1a2e;
      --card2: #16213e;
      --accent: #e94560;
      --green: #2ecc71;
      --muted: #8892a4;
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      background: var(--bg);
      color: #fff;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Header ── */
    .header {
      position: sticky; top: 0; z-index: 10;
      background: var(--bg);
      padding: calc(var(--safe-top) + 16px) 20px 16px;
      display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .back-btn {
      background: var(--card); border: none; color: var(--accent);
      width: 38px; height: 38px; border-radius: 10px; font-size: 22px;
      cursor: pointer; display: none; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .back-btn.visible { display: flex; }
    .header-title { font-size: 1.4rem; font-weight: 700; flex: 1; }
    .header-action {
      background: none; border: none; color: var(--accent);
      font-size: 0.95rem; font-weight: 600; cursor: pointer;
      font-family: inherit; padding: 6px; display: none;
    }
    .header-action.visible { display: block; }

    /* ── Views ── */
    .view { display: none; padding: 20px; padding-bottom: calc(var(--safe-bottom) + 90px); }
    .view.active { display: block; }

    /* ── Tab Bar ── */
    .tab-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
      background: var(--card);
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex;
      padding-bottom: var(--safe-bottom);
    }
    .tab-btn {
      flex: 1; background: none; border: none; color: var(--muted);
      padding: 12px 0 10px; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      font-size: 0.7rem; font-family: inherit; letter-spacing: 0.3px;
      transition: color 0.2s;
    }
    .tab-btn .tab-icon { font-size: 1.35rem; }
    .tab-btn.active { color: var(--accent); }

    /* ── Muscle Group Grid ── */
    .muscle-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .muscle-card {
      background: var(--card); border-radius: 18px; padding: 12px 12px 14px;
      text-align: center; cursor: pointer;
      border: 1px solid rgba(255,255,255,0.05); transition: transform 0.15s;
      position: relative; overflow: hidden;
    }
    .muscle-card::after {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: var(--accent); opacity: 0; transition: opacity 0.15s;
    }
    .muscle-card:active { transform: scale(0.96); }
    .muscle-card:active::after { opacity: 1; }
    /* ── Muscle image overlay ── */
    .muscle-icon-wrap {
      position: relative; width: 100%; aspect-ratio: 1;
      margin-bottom: 8px; border-radius: 10px; overflow: hidden;
      background: #000;
    }
    .muscle-icon-wrap img {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%; object-fit: contain; display: block;
    }
    .muscle-icon-wrap .m-overlay {
      filter: hue-rotate(130deg) saturate(2.4) brightness(1.15);
    }
    .muscle-card .name { font-size: 0.95rem; font-weight: 600; }
    .muscle-card .count { font-size: 0.75rem; color: var(--muted); margin-top: 3px; }
    .muscle-card.wide { grid-column: 1 / -1; }

    /* ── Exercise List ── */
    .exercise-list { display: flex; flex-direction: column; gap: 10px; }
    .exercise-item {
      background: var(--card); border-radius: 14px; padding: 16px 18px;
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; border: 1px solid rgba(255,255,255,0.05); transition: transform 0.12s;
    }
    .exercise-item:active { transform: scale(0.98); background: var(--card2); }
    .exercise-item .ex-name { font-size: 1rem; font-weight: 500; }
    .exercise-item .ex-sub { font-size: 0.78rem; color: var(--muted); margin-top: 3px; }
    .exercise-item .ex-sub.logged { color: var(--green); }
    .exercise-item .arrow { color: var(--accent); font-size: 1.3rem; flex-shrink: 0; }

    /* ── Plans View ── */
    .plans-list { display: flex; flex-direction: column; gap: 12px; }
    .plan-card {
      background: var(--card); border-radius: 16px; padding: 20px;
      cursor: pointer; border: 1px solid rgba(255,255,255,0.05);
      display: flex; align-items: center; justify-content: space-between;
      transition: transform 0.12s;
    }
    .plan-card:active { transform: scale(0.98); }
    .plan-card-name { font-size: 1.15rem; font-weight: 700; }
    .plan-card-meta { font-size: 0.8rem; color: var(--muted); margin-top: 5px; }
    .plan-card-arrow { color: var(--accent); font-size: 1.4rem; }

    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 80px 20px; text-align: center;
    }
    .empty-icon { font-size: 4rem; margin-bottom: 16px; }
    .empty-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 8px; }
    .empty-sub { color: var(--muted); font-size: 0.95rem; margin-bottom: 32px; line-height: 1.5; }
    .empty-cta {
      background: var(--accent); color: white; border: none;
      border-radius: 14px; padding: 14px 32px;
      font-size: 1rem; font-weight: 700; cursor: pointer; font-family: inherit;
    }

    /* FAB */
    .fab {
      position: fixed; right: 20px;
      bottom: calc(var(--safe-bottom) + 74px);
      width: 56px; height: 56px;
      background: var(--accent); border: none; border-radius: 50%;
      color: white; font-size: 2rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(233,69,96,0.45); z-index: 15;
      transition: transform 0.15s;
    }
    .fab:active { transform: scale(0.9); }
    .fab.hidden { display: none; }

    /* ── Plan Detail View ── */
    .plan-detail-list { display: flex; flex-direction: column; gap: 10px; }
    .plan-ex-item {
      background: var(--card); border-radius: 14px; padding: 15px 16px;
      display: flex; align-items: center; gap: 12px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .plan-ex-info { flex: 1; cursor: pointer; }
    .plan-ex-name { font-size: 1rem; font-weight: 500; }
    .plan-ex-sub { font-size: 0.78rem; color: var(--muted); margin-top: 3px; }
    .plan-ex-sub.logged { color: var(--green); }
    .plan-ex-remove {
      background: rgba(255,255,255,0.06); border: none; color: var(--muted);
      width: 30px; height: 30px; border-radius: 50%;
      font-size: 1.1rem; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .plan-ex-remove:active { background: rgba(233,69,96,0.2); color: var(--accent); }

    .add-ex-btn {
      width: 100%; background: none;
      border: 1.5px dashed rgba(233,69,96,0.4);
      color: var(--accent); border-radius: 14px;
      padding: 15px; font-size: 0.95rem; font-weight: 600;
      cursor: pointer; margin-top: 4px; font-family: inherit;
      transition: background 0.15s;
    }
    .add-ex-btn:active { background: rgba(233,69,96,0.08); }

    .plan-detail-actions {
      display: flex; gap: 10px; margin-top: 4px;
    }
    .plan-detail-actions .add-ex-btn { margin-top: 0; }

    /* ── Section Titles inside a plan ── */
    .plan-section-title {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 2px 6px;
    }
    .plan-section-title-text {
      font-size: 0.78rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1.5px; color: var(--accent);
    }
    .plan-title-remove {
      background: none; border: none; color: rgba(255,255,255,0.2);
      font-size: 1.1rem; cursor: pointer; padding: 4px 6px; line-height: 1;
      border-radius: 6px;
    }
    .plan-title-remove:active { color: var(--accent); background: rgba(233,69,96,0.12); }

    /* ── Drag handle ── */
    .drag-handle {
      color: rgba(255,255,255,0.2); font-size: 1.15rem;
      padding: 8px 6px 8px 0; cursor: grab; touch-action: none;
      flex-shrink: 0; user-select: none; -webkit-user-select: none;
      line-height: 1;
    }
    .drag-handle:active { color: rgba(255,255,255,0.5); }

    .plan-empty-ex {
      text-align: center; padding: 40px 20px; color: var(--muted);
    }
    .plan-empty-ex .big { font-size: 3rem; margin-bottom: 10px; }
    .plan-empty-ex p { font-size: 0.95rem; line-height: 1.5; }

    /* ── Exercise Picker ── */
    .picker-list { display: flex; flex-direction: column; gap: 8px; }
    .picker-group { }
    .picker-group-hdr {
      background: var(--card); border-radius: 14px; padding: 14px 18px;
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; border: 1px solid rgba(255,255,255,0.05);
      transition: border-radius 0.2s;
    }
    .picker-group-hdr.open { border-radius: 14px 14px 0 0; }
    .picker-group-left { display: flex; align-items: center; gap: 10px; }
    .picker-group-icon {
      position: relative; width: 42px; height: 42px;
      border-radius: 8px; overflow: hidden; background: #000; flex-shrink: 0;
    }
    .picker-group-icon img {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%; object-fit: contain;
    }
    .picker-group-icon .m-overlay {
      filter: hue-rotate(130deg) saturate(2.4) brightness(1.15);
    }
    .picker-group-name { font-weight: 600; font-size: 0.95rem; }
    .picker-group-badge {
      background: rgba(233,69,96,0.2); color: var(--accent);
      border-radius: 10px; padding: 2px 8px; font-size: 0.72rem; font-weight: 700;
      display: none;
    }
    .picker-group-badge.visible { display: inline; }
    .picker-chevron { color: var(--muted); font-size: 0.9rem; transition: transform 0.2s; }
    .picker-group-hdr.open .picker-chevron { transform: rotate(180deg); }

    .picker-exercises { display: none; flex-direction: column; }
    .picker-exercises.open { display: flex; }
    .picker-ex-item {
      background: var(--card2); border: 1px solid rgba(255,255,255,0.05);
      border-top: none; padding: 13px 18px;
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer;
    }
    .picker-ex-item:last-child { border-radius: 0 0 14px 14px; }
    .picker-ex-item:active { opacity: 0.75; }
    .picker-ex-name { font-size: 0.92rem; }
    .picker-toggle {
      width: 28px; height: 28px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.18);
      background: none; color: var(--muted);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; cursor: pointer; flex-shrink: 0;
      transition: all 0.15s; pointer-events: none;
    }
    .picker-toggle.added { background: var(--green); border-color: var(--green); color: #fff; }

    /* ── Create Plan Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.65);
      z-index: 100; display: none; align-items: flex-end;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--card); border-radius: 24px 24px 0 0; width: 100%;
      max-height: 92vh; overflow-y: auto;
      padding: 16px 20px calc(var(--safe-bottom) + 20px);
      animation: slideUp 0.28s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-handle {
      width: 40px; height: 4px; background: rgba(255,255,255,0.15);
      border-radius: 2px; margin: 0 auto 20px;
    }
    .modal-header {
      display: flex; justify-content: space-between;
      align-items: flex-start; margin-bottom: 20px;
    }
    .modal-title { font-size: 1.45rem; font-weight: 700; flex: 1; padding-right: 12px; }
    .modal-close {
      background: rgba(255,255,255,0.1); border: none; color: #fff;
      width: 32px; height: 32px; border-radius: 50%; font-size: 15px;
      cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .modal-tag {
      display: inline-block; background: rgba(233,69,96,0.18); color: var(--accent);
      border-radius: 20px; padding: 4px 12px; font-size: 0.8rem;
      font-weight: 600; margin-bottom: 16px;
    }
    .modal-desc { color: var(--muted); font-size: 0.95rem; line-height: 1.65; margin-bottom: 20px; }
    .section-label {
      font-size: 0.78rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; color: var(--muted); margin-bottom: 10px;
    }
    .tips-list { list-style: none; margin-bottom: 20px; }
    .tips-list li {
      padding: 9px 0 9px 22px; position: relative;
      font-size: 0.95rem; border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .tips-list li::before { content: '✓'; position: absolute; left: 0; color: var(--accent); font-weight: 700; }
    .sets-box {
      background: var(--bg); border-radius: 12px; padding: 14px;
      margin-bottom: 24px; display: flex; align-items: center; gap: 12px;
    }
    .sets-box .sets-icon { font-size: 1.4rem; }
    .sets-box .sets-label { font-size: 0.78rem; color: var(--muted); }
    .sets-box .sets-value { font-size: 1rem; font-weight: 600; }
    .last-session-box {
      background: var(--bg); border-radius: 12px; padding: 14px;
      margin-bottom: 20px; display: flex; align-items: center; gap: 12px;
    }
    .last-session-box .ls-icon { font-size: 1.4rem; }
    .last-session-box .ls-value { font-size: 1rem; font-weight: 600; }
    .last-session-box .ls-value.none { color: var(--muted); font-weight: 400; font-style: italic; }
    .last-session-box .ls-date { font-size: 0.75rem; color: var(--muted); margin-top: 1px; }
    .log-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .log-field label {
      display: block; font-size: 0.78rem; color: var(--muted);
      margin-bottom: 6px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .log-input-wrap {
      display: flex; align-items: center; background: var(--bg);
      border-radius: 10px; padding: 12px; gap: 6px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .log-input-wrap input {
      background: none; border: none; color: #fff;
      font-size: 1.1rem; font-weight: 600; width: 100%;
      outline: none; font-family: inherit;
    }
    .log-input-wrap input::placeholder { color: rgba(255,255,255,0.25); }
    .log-input-wrap span { color: var(--muted); font-size: 0.85rem; flex-shrink: 0; }
    .save-btn {
      width: 100%; background: var(--green); color: #fff; border: none;
      border-radius: 14px; padding: 15px; font-size: 1rem; font-weight: 700;
      cursor: pointer; margin-bottom: 12px; transition: background 0.3s;
    }
    .save-btn:active { opacity: 0.85; }
    .yt-btn {
      width: 100%; background: rgba(233,69,96,0.15); color: var(--accent);
      border: 1px solid rgba(233,69,96,0.3); border-radius: 14px;
      padding: 15px; font-size: 1rem; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .yt-btn:active { opacity: 0.85; }

    /* Create Plan Modal inputs */
    .plan-name-input {
      width: 100%; background: var(--bg);
      border: 1px solid rgba(255,255,255,0.12); border-radius: 12px;
      padding: 15px 16px; color: white; font-size: 1.1rem;
      font-family: inherit; outline: none; margin-bottom: 16px;
    }
    .plan-name-input:focus { border-color: var(--accent); }
    .plan-name-input::placeholder { color: var(--muted); }
    .create-btn {
      width: 100%; background: var(--accent); color: white; border: none;
      border-radius: 14px; padding: 16px; font-size: 1rem;
      font-weight: 700; cursor: pointer; font-family: inherit;
    }
    .create-btn:active { opacity: 0.85; }

    /* ════════════════════════════
       Body Weight Tab
    ════════════════════════════ */

    /* Stats strip */
    .bw-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 18px; }
    .bw-stat { background: var(--card); border-radius: 14px; padding: 12px 6px; text-align: center; }
    .bw-stat-val { font-size: 1.05rem; font-weight: 700; color: #fff; }
    .bw-stat-lbl { font-size: 0.6rem; color: var(--muted); margin-top: 3px; letter-spacing: 0.5px; text-transform: uppercase; }

    /* Chart */
    .bw-chart-wrap { background: var(--card); border-radius: 20px; padding: 16px 8px 10px; margin-bottom: 22px; position: relative; overflow: visible; }
    .bw-chart-header { padding: 0 8px 12px; display: flex; justify-content: space-between; align-items: center; }
    .bw-chart-title { font-size: 0.9rem; font-weight: 700; }
    .bw-range-row { display: flex; gap: 6px; }
    .bw-range-btn { background: none; border: 1px solid rgba(255,255,255,0.12); color: var(--muted); font-size: 0.7rem; padding: 4px 11px; border-radius: 20px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
    .bw-range-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .bw-chart-svg { width: 100%; display: block; touch-action: none; }
    .bw-tooltip { position: absolute; background: rgba(15,15,26,0.96); border: 1px solid rgba(233,69,96,0.4); border-radius: 10px; padding: 7px 12px; pointer-events: none; opacity: 0; transition: opacity 0.15s; z-index: 10; top: 10px; }
    .bw-tooltip.visible { opacity: 1; }
    .bw-tooltip-val { font-size: 0.95rem; font-weight: 700; color: #fff; }
    .bw-tooltip-date { font-size: 0.7rem; color: var(--muted); margin-top: 1px; }

    /* Calendar */
    .bw-cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .bw-cal-month-lbl { font-size: 1rem; font-weight: 700; }
    .bw-cal-nav { background: var(--card); border: none; color: #fff; width: 36px; height: 36px; border-radius: 10px; font-size: 1.15rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .bw-cal-nav:active { opacity: 0.7; }
    .bw-cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
    .bw-cal-dow { text-align: center; font-size: 0.6rem; color: var(--muted); padding: 4px 0 8px; font-weight: 600; letter-spacing: 0.4px; text-transform: uppercase; }
    .bw-cal-day { aspect-ratio: 1; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; font-size: 0.83rem; position: relative; transition: background 0.12s; }
    .bw-cal-day:active { background: rgba(255,255,255,0.1) !important; }
    .bw-cal-day.other-month { color: rgba(255,255,255,0.18); }
    .bw-cal-day.today { background: rgba(233,69,96,0.18); color: var(--accent); font-weight: 700; }
    .bw-cal-day.has-data::after { content: ''; position: absolute; bottom: 4px; width: 4px; height: 4px; border-radius: 50%; background: var(--green); }
    .bw-cal-day.selected { background: var(--accent) !important; color: #fff !important; font-weight: 700; }
    .bw-cal-day.selected::after { display: none; }

    /* BW Entry Modal */
    .bw-overlay { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.65); display: none; align-items: flex-end; justify-content: center; }
    .bw-overlay.open { display: flex; }
    .bw-sheet { background: var(--card); border-radius: 28px 28px 0 0; padding: 12px 24px 44px; width: 100%; max-width: 500px; transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.32,0.72,0,1); }
    .bw-overlay.open .bw-sheet { transform: translateY(0); }
    .bw-sheet-handle { width: 40px; height: 4px; background: rgba(255,255,255,0.15); border-radius: 2px; margin: 0 auto 22px; }
    .bw-sheet-dateLbl { font-size: 0.8rem; color: var(--muted); text-align: center; margin-bottom: 4px; }
    .bw-sheet-title { font-size: 1.15rem; font-weight: 700; text-align: center; margin-bottom: 24px; }
    .bw-input-row { background: rgba(255,255,255,0.06); border-radius: 18px; display: flex; align-items: center; gap: 10px; padding: 16px 20px; margin-bottom: 20px; }
    .bw-input-row input { background: none; border: none; outline: none; color: #fff; font-size: 2.2rem; font-weight: 700; font-family: inherit; flex: 1; width: 0; min-width: 0; }
    .bw-input-row .bw-unit { font-size: 1.1rem; color: var(--muted); font-weight: 600; }
    .bw-btn-save { width: 100%; background: var(--green); border: none; color: #fff; padding: 16px; border-radius: 16px; font-size: 1rem; font-weight: 700; font-family: inherit; cursor: pointer; margin-bottom: 10px; }
    .bw-btn-save:active { opacity: 0.85; }
    .bw-btn-del { width: 100%; background: none; border: 1px solid rgba(233,69,96,0.3); color: var(--accent); padding: 14px; border-radius: 16px; font-size: 0.95rem; font-weight: 600; font-family: inherit; cursor: pointer; display: none; }
    .bw-btn-del.visible { display: block; }
    .bw-btn-del:active { background: rgba(233,69,96,0.1); }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <button class="back-btn" id="backBtn" onclick="handleBack()">‹</button>
    <span class="header-title" id="headerTitle">My Trainer 💪</span>
    <button class="header-action" id="headerAction"></button>
  </div>

  <!-- ── Exercises Tab ── -->
  <div class="view active" id="homeView">
    <div class="muscle-grid" id="muscleGrid"></div>
  </div>
  <div class="view" id="exerciseView">
    <div class="exercise-list" id="exerciseList"></div>
  </div>

  <!-- ── Plans Tab ── -->
  <div class="view" id="plansView">
    <div id="plansContent"></div>
  </div>
  <div class="view" id="planDetailView">
    <div class="plan-detail-list" id="planDetailList"></div>
    <div class="plan-detail-actions">
      <button class="add-ex-btn" id="addExBtn" onclick="showExercisePicker()">＋ Add Exercises</button>
      <button class="add-ex-btn" id="addTitleBtn" onclick="openAddTitle()" style="border-color:rgba(255,255,255,0.18);color:rgba(255,255,255,0.55);flex:0 0 auto;width:auto;padding:15px 18px;">＋ Title</button>
    </div>
  </div>
  <div class="view" id="exercisePickerView">
    <div class="picker-list" id="pickerList"></div>
  </div>

  <!-- ── Body Weight Tab ── -->
  <div class="view" id="bodyWeightView">
    <div class="bw-stats" id="bwStats"></div>
    <div class="bw-chart-wrap">
      <div class="bw-chart-header">
        <span class="bw-chart-title">Weight Trend</span>
        <div class="bw-range-row">
          <button class="bw-range-btn active" onclick="setBWRange(30,this)">1M</button>
          <button class="bw-range-btn" onclick="setBWRange(90,this)">3M</button>
          <button class="bw-range-btn" onclick="setBWRange(0,this)">All</button>
        </div>
      </div>
      <div style="position:relative;">
        <svg class="bw-chart-svg" id="bwChartSvg" viewBox="0 0 340 140" height="140"></svg>
        <div class="bw-tooltip" id="bwTooltip">
          <div class="bw-tooltip-val" id="bwTooltipVal"></div>
          <div class="bw-tooltip-date" id="bwTooltipDate"></div>
        </div>
      </div>
    </div>
    <div class="bw-cal-header">
      <button class="bw-cal-nav" onclick="bwPrevMonth()">‹</button>
      <span class="bw-cal-month-lbl" id="bwCalMonthLbl"></span>
      <button class="bw-cal-nav" onclick="bwNextMonth()">›</button>
    </div>
    <div class="bw-cal-grid" id="bwCalGrid"></div>
  </div>

  <!-- Body Weight Entry Sheet -->
  <div class="bw-overlay" id="bwOverlay" onclick="handleBWOverlay(event)">
    <div class="bw-sheet" id="bwSheet">
      <div class="bw-sheet-handle"></div>
      <div class="bw-sheet-dateLbl" id="bwSheetDate"></div>
      <div class="bw-sheet-title">Log Body Weight</div>
      <div class="bw-input-row">
        <input type="number" id="bwInput" placeholder="0.0" inputmode="decimal" step="0.1" />
        <span class="bw-unit">kg</span>
      </div>
      <button class="bw-btn-save" onclick="saveBWEntry()">Save</button>
      <button class="bw-btn-del" id="bwBtnDel" onclick="deleteBWEntry()">Delete Entry</button>
    </div>
  </div>

  <!-- FAB (create plan) -->
  <button class="fab hidden" id="fab" onclick="openCreatePlan()">+</button>

  <!-- Tab Bar -->
  <div class="tab-bar">
    <button class="tab-btn active" id="tabEx" onclick="switchTab('exercises')">
      <span class="tab-icon">💪</span><span>All Exercises</span>
    </button>
    <button class="tab-btn" id="tabPlans" onclick="switchTab('plans')">
      <span class="tab-icon">📋</span><span>My Plans</span>
    </button>
    <button class="tab-btn" id="tabWeight" onclick="switchTab('weight')">
      <span class="tab-icon">⚖️</span><span>Body Weight</span>
    </button>
  </div>

  <!-- Exercise Detail Modal -->
  <div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <div class="modal-title" id="modalTitle"></div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-tag" id="modalTag"></div>
      <div class="modal-desc" id="modalDesc"></div>
      <div class="section-label">Key Tips</div>
      <ul class="tips-list" id="modalTips"></ul>
      <button class="yt-btn" id="ytBtn" style="margin-bottom:20px;">▶&nbsp; Watch Tutorial on YouTube</button>
      <div class="section-label">Last Session</div>
      <div class="last-session-box">
        <span class="ls-icon">🕐</span>
        <div>
          <div class="ls-value" id="lastSessionValue">No data yet</div>
          <div class="ls-date" id="lastSessionDate"></div>
        </div>
      </div>
      <div class="section-label">Log Today</div>
      <div class="log-row">
        <div class="log-field">
          <label>Weight</label>
          <div class="log-input-wrap">
            <input type="number" id="logWeight" placeholder="0" inputmode="decimal" />
            <span>kg</span>
          </div>
        </div>
        <div class="log-field">
          <label>Reps</label>
          <div class="log-input-wrap">
            <input type="number" id="logReps" placeholder="0" inputmode="numeric" />
            <span>reps</span>
          </div>
        </div>
      </div>
      <button class="save-btn" id="saveBtn" onclick="saveLog()">Save</button>
    </div>
  </div>

  <!-- Add Title Modal -->
  <div class="modal-overlay" id="addTitleOverlay" onclick="handleTitleOverlayClick(event)">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <div class="modal-title">Add Section Title</div>
        <button class="modal-close" onclick="closeAddTitle()">✕</button>
      </div>
      <input class="plan-name-input" id="titleInput"
        type="text" placeholder="e.g. Warmup, Main Set, Finisher…"
        maxlength="30" onkeydown="if(event.key==='Enter')saveTitle()" />
      <button class="create-btn" onclick="saveTitle()">Add Title</button>
    </div>
  </div>

  <!-- Create Plan Modal -->
  <div class="modal-overlay" id="createPlanOverlay" onclick="handleCreateOverlayClick(event)">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <div class="modal-title">New Plan</div>
        <button class="modal-close" onclick="closeCreatePlan()">✕</button>
      </div>
      <input class="plan-name-input" id="planNameInput"
        type="text" placeholder="e.g. Push Day, Chest & Triceps..."
        maxlength="40" onkeydown="if(event.key==='Enter')createPlan()" />
      <button class="create-btn" onclick="createPlan()">Create Plan</button>
    </div>
  </div>

    // ── Helpers: find exercise by name ──
    function findExercise(name) {
      for (const group of Object.values(data)) {
        const ex = group.exercises.find(e => e.name === name);
        if (ex) return { ex, groupName: group.name };
      }
      return null;
    }

    // ── localStorage: exercise logs ──
    function storageKey(name) { return 'trainer_ex_' + name; }
    function getLog(name) {
      try { return JSON.parse(localStorage.getItem(storageKey(name))); } catch { return null; }
    }
    function saveLogData(name, weight, reps) {
      const date = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
      localStorage.setItem(storageKey(name), JSON.stringify({ weight, reps, date }));
    }

    // ── localStorage: plans ──
    function getPlans() {
      try { return JSON.parse(localStorage.getItem('trainer_plans') || '[]'); } catch { return []; }
    }
    function savePlans(plans) {
      localStorage.setItem('trainer_plans', JSON.stringify(plans));
    }
    function getPlan(id) { return getPlans().find(p => p.id === id); }

    // ── Tab switching ──
    function switchTab(tab) {
      currentTab = tab;
      document.getElementById('tabEx').classList.toggle('active', tab === 'exercises');
      document.getElementById('tabPlans').classList.toggle('active', tab === 'plans');
      document.getElementById('tabWeight').classList.toggle('active', tab === 'weight');

      if (tab === 'exercises') {
        showView('homeView');
        setHeader('My Trainer 💪', false);
        document.getElementById('fab').classList.add('hidden');
        navContext = 'home';
        buildHome();
      } else {
        showView('plansView');
        setHeader('My Plans', false);
        document.getElementById('fab').classList.remove('hidden');
        navContext = 'plans';
        renderPlans();
      } else if (tab === 'weight') {
        showView('bodyWeightView');
        setHeader('Body Weight', false);
        document.getElementById('fab').classList.add('hidden');
        navContext = 'weight';
        buildWeightView();
      }
    }

    // ── Navigation ──
    function showView(id) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function setHeader(title, showBack, actionLabel, actionFn) {
      document.getElementById('headerTitle').textContent = title;
      document.getElementById('backBtn').classList.toggle('visible', showBack);
      const btn = document.getElementById('headerAction');
      if (actionLabel) {
        btn.textContent = actionLabel;
        btn.onclick = actionFn;
        btn.classList.add('visible');
      } else {
        btn.classList.remove('visible');
      }
    }

    function handleBack() {
      if (navContext === 'exercise-list') {
        showView('homeView');
        setHeader('My Trainer 💪', false);
        document.getElementById('fab').classList.add('hidden');
        navContext = 'home';
        currentMuscleKey = null;
      } else if (navContext === 'plan-detail') {
        showView('plansView');
        setHeader('My Plans', false);
        document.getElementById('fab').classList.remove('hidden');
        navContext = 'plans';

    // ── Build Exercises Home ──
    function buildHome() {
      const grid = document.getElementById('muscleGrid');
      const entries = Object.entries(data);
      grid.innerHTML = '';
      entries.forEach(([key, group], i) => {
        const card = document.createElement('div');
        card.className = 'muscle-card';
        card.innerHTML = `
          <div class="muscle-icon-wrap">
            <img src="images/baseImage_transparent.png" alt="" loading="lazy">
            <img class="m-overlay" src="images/${group.img}.png" alt="${group.name}" loading="lazy">
          </div>
          <div class="name">${group.name}</div>
          <div class="count">${group.exercises.length} exercises</div>`;
        card.onclick = () => showExercises(key);
        grid.appendChild(card);
      });
    }

    function showExercises(key) {
      currentMuscleKey = key;
      const group = data[key];
      const list = document.getElementById('exerciseList');
      list.innerHTML = '';
      group.exercises.forEach(ex => {
        const log = getLog(ex.name);
        const item = document.createElement('div');
        item.className = 'exercise-item';
        const subText = log ? `Last: ${log.weight} kg × ${log.reps} reps` : group.name;
        item.innerHTML = `
          <div>
            <div class="ex-name">${ex.name}</div>
            <div class="ex-sub ${log ? 'logged' : ''}">${subText}</div>
          </div>
          <span class="arrow">›</span>`;

    // ── Plans ──
    function renderPlans() {
      const plans = getPlans();
      const container = document.getElementById('plansContent');
      if (plans.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📋</div>
            <div class="empty-title">No Plans Yet</div>
            <div class="empty-sub">Create your first workout plan and add exercises from any muscle group.</div>
            <button class="empty-cta" onclick="openCreatePlan()">+ Create Plan</button>
          </div>`;
      } else {
        container.innerHTML = '<div class="plans-list" id="plansList"></div>';
        const list = document.getElementById('plansList');
        plans.forEach(plan => {
          const card = document.createElement('div');
          card.className = 'plan-card';
          const exCount = plan.exercises.filter(i => typeof i === 'string').length;
          card.innerHTML = `
            <div>
              <div class="plan-card-name">${plan.name}</div>
              <div class="plan-card-meta">${exCount === 0 ? 'No exercises yet' : exCount + ' exercise' + (exCount !== 1 ? 's' : '')}</div>
            </div>
            <span class="plan-card-arrow">›</span>`;
          card.onclick = () => showPlanDetail(plan.id);
          list.appendChild(card);

    function openCreatePlan() {
      document.getElementById('planNameInput').value = '';
      document.getElementById('createPlanOverlay').classList.add('open');
      setTimeout(() => document.getElementById('planNameInput').focus(), 300);
    }

    function closeCreatePlan() {
      document.getElementById('createPlanOverlay').classList.remove('open');
    }

    function handleCreateOverlayClick(e) {
      if (e.target === document.getElementById('createPlanOverlay')) closeCreatePlan();
    }

    function createPlan() {
      const name = document.getElementById('planNameInput').value.trim();
      if (!name) return;
      const plans = getPlans();
      const newPlan = { id: 'plan_' + Date.now(), name, exercises: [] };
      plans.push(newPlan);
      savePlans(plans);
      closeCreatePlan();
      showPlanDetail(newPlan.id);
    }

    function deletePlan() {
      if (!currentPlanId) return;
      const plan = getPlan(currentPlanId);
      if (!plan) return;
      if (!confirm(`Delete "${plan.name}"?`)) return;
      const plans = getPlans().filter(p => p.id !== currentPlanId);
      savePlans(plans);
      switchTab('plans');
    }

    // ── Plan Detail ──
    function showPlanDetail(planId) {
      currentPlanId = planId;
      const plan = getPlan(planId);
      if (!plan) return;

      const list = document.getElementById('planDetailList');
      list.innerHTML = '';

      const exItems = plan.exercises.filter(i => typeof i === 'string');
      if (plan.exercises.length === 0) {
        list.innerHTML = `
          <div class="plan-empty-ex">
            <div class="big">🏋️</div>
            <p>No exercises yet.<br>Tap below to add some.</p>
          </div>`;
      } else {
        plan.exercises.forEach((item, idx) => {
          // ── Section title ──
          if (item && typeof item === 'object' && item.title !== undefined) {
            const row = document.createElement('div');
            row.className = 'plan-section-title';
            row.dataset.planItemIdx = idx;
            row.innerHTML = `
              <span class="drag-handle" style="padding:4px 8px 4px 0;font-size:1rem;">⠿</span>
              <span class="plan-section-title-text">${item.title}</span>
              <button class="plan-title-remove" title="Remove title">✕</button>`;
            row.querySelector('.plan-title-remove').onclick = () => {
              removeTitleFromPlan(planId, idx);
            };
            list.appendChild(row);
            return;
          }
          // ── Exercise ──
          const exName = item;
          const found = findExercise(exName);
          if (!found) return;
          const log = getLog(exName);
          const el = document.createElement('div');
          el.className = 'plan-ex-item';
          el.dataset.planItemIdx = idx;
          const subText = log ? `Last: ${log.weight} kg × ${log.reps} reps` : found.groupName;
          el.innerHTML = `
            <span class="drag-handle">⠿</span>
            <div class="plan-ex-info">
              <div class="plan-ex-name">${exName}</div>
              <div class="plan-ex-sub ${log ? 'logged' : ''}">${subText}</div>
            </div>
            <button class="plan-ex-remove" title="Remove">−</button>`;
          el.querySelector('.plan-ex-info').onclick = () => openModal(found.ex, found.groupName);
          el.querySelector('.plan-ex-remove').onclick = (e) => {
            e.stopPropagation();
            removeExerciseFromPlan(planId, exName);
          };
          list.appendChild(el);
        });
      }

      // Init drag-to-reorder on all rendered items
      [...list.children].forEach((child, i) => _initItemDrag(child, i));

      showView('planDetailView');
      setHeader(plan.name, true, 'Delete', deletePlan);
      document.getElementById('fab').classList.add('hidden');
      navContext = 'plan-detail';
    }

    function removeExerciseFromPlan(planId, exName) {
      const plans = getPlans();
      const plan = plans.find(p => p.id === planId);
      if (!plan) return;
      plan.exercises = plan.exercises.filter(i => i !== exName);
      savePlans(plans);
      showPlanDetail(planId);
    }

    function removeTitleFromPlan(planId, idx) {
      const plans = getPlans();
      const plan = plans.find(p => p.id === planId);
      if (!plan) return;
      plan.exercises.splice(idx, 1);
      savePlans(plans);
      showPlanDetail(planId);
    }

      const plans = getPlans();

    function togglePickerGroup(hdr) {
      const key = hdr.closest('.picker-group').querySelector('.picker-exercises').id.replace('picker_', '');
      hdr.classList.toggle('open');

    function toggleExerciseInPlan(exName, groupKey) {
      const plans = getPlans();
      const plan = plans.find(p => p.id === currentPlanId);
      if (!plan) return;

      const idx = plan.exercises.findIndex(i => i === exName);
      if (idx === -1) {
        plan.exercises.push(exName);
      } else {
        plan.exercises.splice(idx, 1);
      }
      savePlans(plans);

      // Update UI instantly
      const safeId = exName.replace(/[^a-z0-9]/gi, '_');
      const toggle = document.getElementById('ptoggle_' + safeId);
      if (toggle) toggle.classList.toggle('added', idx === -1);

      // Update badge
      const updatedPlan = getPlan(currentPlanId);
      const group = data[groupKey];
      if (group) {
        const count = group.exercises.filter(e => updatedPlan.exercises.some(i => i === e.name)).length;
        const badge = document.getElementById('badge_' + groupKey);
        if (badge) {
          badge.textContent = count;
          badge.classList.toggle('visible', count > 0);
        }
      }
    }

    // ── Drag-to-reorder plan items ──
    let _drag = null;
    let _dragOrigItems = null;

    function _initItemDrag(el, domIdx) {
      const handle = el.querySelector('.drag-handle');
      if (!handle) return;
      handle.addEventListener('touchstart', e => {
        e.preventDefault();
        e.stopPropagation();
        _startDrag(e, domIdx);
      }, { passive: false });
    }

    function _startDrag(e, domIdx) {
      if (_drag) return;
      const plan = getPlan(currentPlanId);
      if (!plan) return;
      _dragOrigItems = [...plan.exercises];

      const touch = e.touches[0];
      const listEl = document.getElementById('planDetailList');
      const el = [...listEl.children][domIdx];
      if (!el) return;
      const rect = el.getBoundingClientRect();

      const ghost = el.cloneNode(true);
      ghost.style.cssText = `position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;z-index:1000;pointer-events:none;opacity:0.93;box-shadow:0 10px 40px rgba(0,0,0,0.6);transform:scale(1.03);border-radius:14px;transition:none;background:var(--card);`;
      document.body.appendChild(ghost);
      el.style.visibility = 'hidden';

      _drag = { el, ghost, listEl, offsetY: touch.clientY - rect.top };

      document.addEventListener('touchmove', _onDragMove, { passive: false });
      document.addEventListener('touchend', _onDragEnd, { once: true });
    }

    function _onDragMove(e) {
      e.preventDefault();
      if (!_drag) return;
      const touch = e.touches[0];
      const { ghost, el, offsetY, listEl } = _drag;
      ghost.style.top = (touch.clientY - offsetY) + 'px';

      // Find insertion point
      const siblings = [...listEl.children].filter(c => c !== el);
      let insertBefore = null;
      for (const sib of siblings) {
        const r = sib.getBoundingClientRect();
        if (touch.clientY < r.top + r.height / 2) { insertBefore = sib; break; }
      }
      if (insertBefore) listEl.insertBefore(el, insertBefore);
      else listEl.appendChild(el);
    }

    function _onDragEnd() {
      document.removeEventListener('touchmove', _onDragMove);
      if (!_drag) return;
      const { el, ghost, listEl } = _drag;
      ghost.remove();
      el.style.visibility = '';

      // Rebuild order from DOM data-plan-item-idx
      const newOrder = [...listEl.children].map(child => {
        const origIdx = parseInt(child.dataset.planItemIdx);
        return _dragOrigItems[origIdx];
      }).filter(i => i !== undefined);

      const plans = getPlans();
      const plan = plans.find(p => p.id === currentPlanId);
      if (plan) { plan.exercises = newOrder; savePlans(plans); }

      _drag = null;
      _dragOrigItems = null;
      showPlanDetail(currentPlanId);
    }

    // ── Modal swipe-down to dismiss ──
    function initModalSwipe() {
      const overlay = document.getElementById('modalOverlay');
      const modal = overlay.querySelector('.modal');
      let _md = null;

      modal.addEventListener('touchstart', e => {
        const touch = e.touches[0];
        const rect = modal.getBoundingClientRect();
        if (touch.clientY - rect.top > 72) return; // only top area
        _md = { startY: touch.clientY };
      }, { passive: true });

      modal.addEventListener('touchmove', e => {
        if (!_md) return;
        const dy = Math.max(0, e.touches[0].clientY - _md.startY);
        e.preventDefault();
        modal.style.transition = 'none';
        modal.style.transform = `translateY(${dy}px)`;
        overlay.style.background = `rgba(0,0,0,${Math.max(0.05, 0.65 - dy / 350)})`;
      }, { passive: false });

      modal.addEventListener('touchend', e => {
        if (!_md) return;
        const dy = e.changedTouches[0].clientY - _md.startY;
        modal.style.transition = '';
        overlay.style.background = '';
        if (dy > 110) {
          modal.style.transform = `translateY(110%)`;
          setTimeout(() => { modal.style.transform = ''; closeModal(); }, 240);
        } else {
          modal.style.transform = '';
        }
        _md = null;
      });
    }

    // ════════════════════════════════════════
    // Body Weight Feature
    // ════════════════════════════════════════

    function getBWData() {
      try { return JSON.parse(localStorage.getItem('trainer_bw') || '{}'); } catch { return {}; }
    }
    function saveBWData(data) { localStorage.setItem('trainer_bw', JSON.stringify(data)); }

    function bwToStr(d) {
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    function bwFmtLabel(dateStr) {
      const [y,m,d] = dateStr.split('-').map(Number);
      return new Date(y, m-1, d).toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short' });
    }

    let bwCalYear = new Date().getFullYear();
    let bwCalMon  = new Date().getMonth();
    let bwRange   = 30;
    let bwSelDate = null;

    function buildWeightView() {
      renderBWStats();
      renderBWChart();
      renderBWCalendar();
    }

    // ── Stats strip ──
    function renderBWStats() {
      const data  = getBWData();
      const vals  = Object.values(data).map(Number).filter(v => v > 0);
      const today = bwToStr(new Date());
      const sorted = Object.entries(data).sort(([a],[b]) => a.localeCompare(b));
      const lastEntry = sorted.length ? Number(sorted[sorted.length-1][1]) : null;
      const current = data[today] ? Number(data[today]) : lastEntry;
      const min = vals.length ? Math.min(...vals) : null;
      const max = vals.length ? Math.max(...vals) : null;
      const avg = vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : null;
      const f = v => v != null ? v.toFixed(1) : '—';
      document.getElementById('bwStats').innerHTML =
        `<div class="bw-stat"><div class="bw-stat-val">${f(current)}</div><div class="bw-stat-lbl">Current</div></div>
         <div class="bw-stat"><div class="bw-stat-val" style="color:var(--green)">${f(min)}</div><div class="bw-stat-lbl">Min</div></div>
         <div class="bw-stat"><div class="bw-stat-val" style="color:var(--accent)">${f(max)}</div><div class="bw-stat-lbl">Max</div></div>
         <div class="bw-stat"><div class="bw-stat-val">${f(avg)}</div><div class="bw-stat-lbl">Avg</div></div>`;
    }

    function setBWRange(days, btn) {
      bwRange = days;
      document.querySelectorAll('.bw-range-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderBWChart();
    }

    // ── Chart ──
    function renderBWChart() {
      const svg = document.getElementById('bwChartSvg');
      if (!svg) return;
      const data = getBWData();

      let entries = Object.entries(data)
        .filter(([,v]) => Number(v) > 0)
        .sort(([a],[b]) => a.localeCompare(b))
        .map(([d,v]) => [d, Number(v)]);

      if (bwRange > 0) {
        const cut = new Date(); cut.setDate(cut.getDate() - bwRange);
        entries = entries.filter(([d]) => d >= bwToStr(cut));
      }

      if (entries.length < 2) {
        svg.setAttribute('viewBox','0 0 300 120'); svg.setAttribute('height','120');
        svg.innerHTML = `<text x="50%" y="50%" text-anchor="middle" fill="rgba(255,255,255,0.2)" font-size="13" dominant-baseline="middle" font-family="-apple-system,sans-serif">Log weight on multiple days to see your trend</text>`;
        return;
      }

      const W=340, H=150, P={t:14,r:18,b:30,l:42};
      const cW = W-P.l-P.r, cH = H-P.t-P.b;
      const vals = entries.map(([,v])=>v);
      const minV = Math.min(...vals), maxV = Math.max(...vals);
      const spread = maxV - minV || 1;
      const xS = i => P.l + (i/(entries.length-1))*cW;
      const yS = v => P.t + cH - ((v-minV)/spread)*cH;
      const pts = entries.map(([d,v],i) => ({x:xS(i), y:yS(v), d, v}));

      // Smooth bezier
      let linePath = `M ${pts[0].x} ${pts[0].y}`;
      for (let i=1; i<pts.length; i++) {
        const p=pts[i-1], c=pts[i];
        const cx1=p.x+(c.x-p.x)/3, cx2=c.x-(c.x-p.x)/3;
        linePath += ` C ${cx1} ${p.y}, ${cx2} ${c.y}, ${c.x} ${c.y}`;
      }
      const areaPath = linePath + ` L ${pts[pts.length-1].x} ${H-P.b} L ${pts[0].x} ${H-P.b} Z`;

      // Y labels
      const yLbls = [minV,(minV+maxV)/2,maxV].map(v =>
        `<text x="${P.l-6}" y="${yS(v)}" text-anchor="end" dominant-baseline="middle" fill="rgba(255,255,255,0.3)" font-size="9" font-family="-apple-system,sans-serif">${v.toFixed(1)}</text>`
      ).join('');

      // X labels (first / mid / last)
      const xIdxs = entries.length <= 3
        ? entries.map((_,i)=>i)
        : [0, Math.floor((entries.length-1)/2), entries.length-1];
      const xLbls = [...new Set(xIdxs)].map(i => {
        const [ds] = entries[i]; const [,m,d] = ds.split('-');
        return `<text x="${xS(i)}" y="${H-P.b+14}" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="9" font-family="-apple-system,sans-serif">${d}/${m}</text>`;
      }).join('');

      const dots = pts.map(p =>
        `<circle cx="${p.x}" cy="${p.y}" r="3.5" fill="var(--accent)" stroke="var(--card)" stroke-width="2"/>`
      ).join('');

      svg.setAttribute('viewBox',`0 0 ${W} ${H}`); svg.setAttribute('height', H);
      svg.innerHTML = `
        <defs>
          <linearGradient id="bwG" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="rgba(233,69,96,0.38)"/>
            <stop offset="100%" stop-color="rgba(233,69,96,0.0)"/>
          </linearGradient>
        </defs>
        <line x1="${P.l}" y1="${H-P.b}" x2="${W-P.r}" y2="${H-P.b}" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
        <path d="${areaPath}" fill="url(#bwG)"/>
        <path d="${linePath}" fill="none" stroke="var(--accent)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        ${yLbls}${xLbls}${dots}`;

      // Touch tooltip
      const tooltip = document.getElementById('bwTooltip');
      function showTip(clientX) {
        const rect = svg.getBoundingClientRect();
        const relX = (clientX - rect.left) * (W / rect.width);
        let best = pts[0];
        pts.forEach(p => { if (Math.abs(p.x-relX) < Math.abs(best.x-relX)) best = p; });
        document.getElementById('bwTooltipVal').textContent  = `${best.v.toFixed(1)} kg`;
        document.getElementById('bwTooltipDate').textContent = bwFmtLabel(best.d);
        const pct = ((best.x - P.l) / cW) * 100;
        tooltip.style.left = `${Math.min(Math.max(pct, 5), 65)}%`;
        tooltip.classList.add('visible');
      }
      svg.addEventListener('touchstart', e => { e.preventDefault(); showTip(e.touches[0].clientX); }, {passive:false});
      svg.addEventListener('touchmove',  e => { e.preventDefault(); showTip(e.touches[0].clientX); }, {passive:false});
      svg.addEventListener('touchend',   () => setTimeout(() => tooltip.classList.remove('visible'), 1400));
    }

    // ── Calendar ──
    function renderBWCalendar() {
      const data  = getBWData();
      const today = bwToStr(new Date());
      const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      document.getElementById('bwCalMonthLbl').textContent = `${MONTHS[bwCalMon]} ${bwCalYear}`;

      const firstDow   = new Date(bwCalYear, bwCalMon, 1).getDay();
      const daysInMon  = new Date(bwCalYear, bwCalMon+1, 0).getDate();
      const daysInPrev = new Date(bwCalYear, bwCalMon, 0).getDate();

      let html = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class="bw-cal-dow">${d}</div>`).join('');

      // Prev month pad
      for (let i=firstDow-1; i>=0; i--) {
        const d = daysInPrev-i;
        const m = bwCalMon===0?12:bwCalMon, y = bwCalMon===0?bwCalYear-1:bwCalYear;
        const ds = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        html += `<div class="bw-cal-day other-month${data[ds]?' has-data':''}" onclick="openBWEntry('${ds}')">${d}</div>`;
      }
      // This month
      for (let d=1; d<=daysInMon; d++) {
        const ds = `${bwCalYear}-${String(bwCalMon+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const cls = [
          'bw-cal-day',
          ds===today       ? 'today'    : '',
          data[ds]         ? 'has-data' : '',
          ds===bwSelDate   ? 'selected' : '',
        ].filter(Boolean).join(' ');
        html += `<div class="${cls}" onclick="openBWEntry('${ds}')">${d}</div>`;
      }
      // Next month pad (fill to 42 cells)
      const remain = 42 - (firstDow + daysInMon);
      for (let d=1; d<=remain; d++) {
        const m = bwCalMon===11?1:bwCalMon+2, y = bwCalMon===11?bwCalYear+1:bwCalYear;
        const ds = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        html += `<div class="bw-cal-day other-month${data[ds]?' has-data':''}" onclick="openBWEntry('${ds}')">${d}</div>`;
      }
      document.getElementById('bwCalGrid').innerHTML = html;
    }

    function bwPrevMonth() {
      if (bwCalMon===0) { bwCalMon=11; bwCalYear--; } else bwCalMon--;
      renderBWCalendar();
    }
    function bwNextMonth() {
      if (bwCalMon===11) { bwCalMon=0; bwCalYear++; } else bwCalMon++;
      renderBWCalendar();
    }

    // ── Entry sheet ──
    function openBWEntry(dateStr) {
      bwSelDate = dateStr;
      renderBWCalendar();
      const existing = getBWData()[dateStr];
      document.getElementById('bwSheetDate').textContent = bwFmtLabel(dateStr);
      document.getElementById('bwInput').value = existing || '';
      document.getElementById('bwBtnDel').classList.toggle('visible', !!existing);
      document.getElementById('bwOverlay').classList.add('open');
      setTimeout(() => document.getElementById('bwInput').focus(), 380);
    }
    function closeBWEntry() {
      document.getElementById('bwOverlay').classList.remove('open');
    }
    function handleBWOverlay(e) {
      if (e.target === document.getElementById('bwOverlay')) closeBWEntry();
    }
    function saveBWEntry() {
      const val = parseFloat(document.getElementById('bwInput').value);
      const inp = document.getElementById('bwInput');
      if (!val || val <= 0 || val > 500) {
        inp.style.color = 'var(--accent)';
        setTimeout(() => inp.style.color = '', 600);
        return;
      }
      const data = getBWData();
      data[bwSelDate] = Math.round(val * 10) / 10;
      saveBWData(data);
      closeBWEntry();
      buildWeightView();
    }
    function deleteBWEntry() {
      const data = getBWData();
      delete data[bwSelDate];
      saveBWData(data);
      bwSelDate = null;
      closeBWEntry();
      buildWeightView();
    }

    // ── Init ──
    buildHome();
    initModalSwipe();
  </script>
</body>
</html>
