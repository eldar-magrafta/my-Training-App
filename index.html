<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0f1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="My Trainer" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>My Trainer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #0f0f1a;
      --card: #1a1a2e;
      --card2: #16213e;
      --accent: #e94560;
      --green: #2ecc71;
      --muted: #8892a4;
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      background: var(--bg);
      color: #fff;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Header ── */
    .header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--bg);
      padding: calc(var(--safe-top) + 16px) 20px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .back-btn {
      background: var(--card);
      border: none;
      color: var(--accent);
      width: 38px; height: 38px;
      border-radius: 10px;
      font-size: 22px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .back-btn.visible { display: flex; }
    .header-title { font-size: 1.4rem; font-weight: 700; }

    /* ── Views ── */
    .view { display: none; padding: 20px; padding-bottom: calc(var(--safe-bottom) + 24px); }
    .view.active { display: block; }

    /* ── Muscle Group Grid ── */
    .muscle-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .muscle-card {
      background: var(--card);
      border-radius: 18px;
      padding: 24px 16px;
      text-align: center;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.05);
      transition: transform 0.15s;
      position: relative;
      overflow: hidden;
    }
    .muscle-card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--accent);
      opacity: 0;
      transition: opacity 0.15s;
    }
    .muscle-card:active { transform: scale(0.96); }
    .muscle-card:active::after { opacity: 1; }
    .muscle-card .icon { font-size: 2.2rem; margin-bottom: 10px; }
    .muscle-card .name { font-size: 0.95rem; font-weight: 600; }
    .muscle-card .count { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }
    .muscle-card.wide { grid-column: 1 / -1; }

    /* ── Exercise List ── */
    .exercise-list { display: flex; flex-direction: column; gap: 10px; }

    .exercise-item {
      background: var(--card);
      border-radius: 14px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.05);
      transition: transform 0.12s;
    }
    .exercise-item:active { transform: scale(0.98); background: var(--card2); }
    .exercise-item .ex-name { font-size: 1rem; font-weight: 500; }
    .exercise-item .ex-sub { font-size: 0.78rem; color: var(--muted); margin-top: 3px; }
    .exercise-item .ex-sub.logged { color: var(--green); }
    .exercise-item .arrow { color: var(--accent); font-size: 1.3rem; flex-shrink: 0; }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 100;
      display: none;
      align-items: flex-end;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--card);
      border-radius: 24px 24px 0 0;
      width: 100%;
      max-height: 92vh;
      overflow-y: auto;
      padding: 16px 20px calc(var(--safe-bottom) + 20px);
      animation: slideUp 0.28s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }

    .modal-handle {
      width: 40px; height: 4px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
      margin: 0 auto 20px;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }
    .modal-title { font-size: 1.45rem; font-weight: 700; flex: 1; padding-right: 12px; }
    .modal-close {
      background: rgba(255,255,255,0.1);
      border: none; color: #fff;
      width: 32px; height: 32px;
      border-radius: 50%;
      font-size: 15px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .modal-tag {
      display: inline-block;
      background: rgba(233,69,96,0.18);
      color: var(--accent);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 16px;
    }
    .modal-desc {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.65;
      margin-bottom: 20px;
    }
    .section-label {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .tips-list { list-style: none; margin-bottom: 20px; }
    .tips-list li {
      padding: 9px 0 9px 22px;
      position: relative;
      font-size: 0.95rem;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .tips-list li::before { content: '✓'; position: absolute; left: 0; color: var(--accent); font-weight: 700; }

    .sets-box {
      background: var(--bg);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .sets-box .sets-icon { font-size: 1.4rem; }
    .sets-box .sets-label { font-size: 0.78rem; color: var(--muted); }
    .sets-box .sets-value { font-size: 1rem; font-weight: 600; }

    /* ── Last Session ── */
    .last-session-box {
      background: var(--bg);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .last-session-box .ls-icon { font-size: 1.4rem; }
    .last-session-box .ls-label { font-size: 0.78rem; color: var(--muted); }
    .last-session-box .ls-value { font-size: 1rem; font-weight: 600; }
    .last-session-box .ls-value.none { color: var(--muted); font-weight: 400; font-style: italic; }
    .last-session-box .ls-date { font-size: 0.75rem; color: var(--muted); margin-top: 1px; }

    /* ── Log Today ── */
    .log-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }
    .log-field label {
      display: block;
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .log-input-wrap {
      display: flex;
      align-items: center;
      background: var(--bg);
      border-radius: 10px;
      padding: 12px;
      gap: 6px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .log-input-wrap input {
      background: none;
      border: none;
      color: #fff;
      font-size: 1.1rem;
      font-weight: 600;
      width: 100%;
      outline: none;
      font-family: inherit;
    }
    .log-input-wrap input::placeholder { color: rgba(255,255,255,0.25); }
    .log-input-wrap span { color: var(--muted); font-size: 0.85rem; flex-shrink: 0; }

    .save-btn {
      width: 100%;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 15px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 12px;
      transition: background 0.3s, opacity 0.15s;
    }
    .save-btn:active { opacity: 0.85; }

    .yt-btn {
      width: 100%;
      background: rgba(233,69,96,0.15);
      color: var(--accent);
      border: 1px solid rgba(233,69,96,0.3);
      border-radius: 14px;
      padding: 15px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .yt-btn:active { opacity: 0.85; }
  </style>
</head>
<body>

  <div class="header">
    <button class="back-btn" id="backBtn" onclick="goHome()">‹</button>
    <span class="header-title" id="headerTitle">My Trainer 💪</span>
  </div>

  <!-- Home: Muscle Groups -->
  <div class="view active" id="homeView">
    <div class="muscle-grid" id="muscleGrid"></div>
  </div>

  <!-- Exercise List -->
  <div class="view" id="exerciseView">
    <div class="exercise-list" id="exerciseList"></div>
  </div>

  <!-- Exercise Detail Modal -->
  <div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
    <div class="modal" id="modal">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <div class="modal-title" id="modalTitle"></div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-tag" id="modalTag"></div>
      <div class="modal-desc" id="modalDesc"></div>

      <div class="section-label">Key Tips</div>
      <ul class="tips-list" id="modalTips"></ul>

      <div class="sets-box">
        <span class="sets-icon">📊</span>
        <div>
          <div class="sets-label">Recommended Volume</div>
          <div class="sets-value" id="modalSets"></div>
        </div>
      </div>

      <div class="section-label">Last Session</div>
      <div class="last-session-box">
        <span class="ls-icon">🕐</span>
        <div>
          <div class="ls-value" id="lastSessionValue">No data yet</div>
          <div class="ls-date" id="lastSessionDate"></div>
        </div>
      </div>

      <div class="section-label">Log Today</div>
      <div class="log-row">
        <div class="log-field">
          <label>Weight</label>
          <div class="log-input-wrap">
            <input type="number" id="logWeight" placeholder="0" inputmode="decimal" />
            <span>kg</span>
          </div>
        </div>
        <div class="log-field">
          <label>Reps</label>
          <div class="log-input-wrap">
            <input type="number" id="logReps" placeholder="0" inputmode="numeric" />
            <span>reps</span>
          </div>
        </div>
      </div>
      <button class="save-btn" id="saveBtn" onclick="saveLog()">Save</button>

      <button class="yt-btn" id="ytBtn">▶&nbsp; Watch Tutorial on YouTube</button>
    </div>
  </div>

    // ── localStorage helpers ──
    function storageKey(name) { return 'trainer_ex_' + name; }

    function getLog(name) {
      try { return JSON.parse(localStorage.getItem(storageKey(name))); } catch { return null; }
    }

    function saveLogData(name, weight, reps) {
      const date = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
      localStorage.setItem(storageKey(name), JSON.stringify({ weight, reps, date }));
    }

    // ── Build Home ──
    function buildHome() {
      const grid = document.getElementById('muscleGrid');
      const entries = Object.entries(data);
      grid.innerHTML = '';
      entries.forEach(([key, group], i) => {
        const isLastOdd = i === entries.length - 1 && entries.length % 2 !== 0;
        const card = document.createElement('div');
        card.className = 'muscle-card' + (isLastOdd ? ' wide' : '');
        card.innerHTML = `
          <div class="icon">${group.icon}</div>
          <div class="name">${group.name}</div>
          <div class="count">${group.exercises.length} exercises</div>
        `;
        card.onclick = () => showExercises(key);
        grid.appendChild(card);
      });
    }

    // ── Show Exercise List ──
    function showExercises(key) {
      currentMuscleKey = key;
      const group = data[key];
      const list = document.getElementById('exerciseList');
      list.innerHTML = '';

      group.exercises.forEach(ex => {
        const log = getLog(ex.name);
        const item = document.createElement('div');
        item.className = 'exercise-item';
        const subText = log
          ? `Last: ${log.weight} kg × ${log.reps} reps`
          : ex.sets;
        item.innerHTML = `
          <div>
            <div class="ex-name">${ex.name}</div>
            <div class="ex-sub ${log ? 'logged' : ''}">${subText}</div>
          </div>
          <span class="arrow">›</span>
        `;
        item.onclick = () => openModal(ex, group.name);
        list.appendChild(item);
      });

      document.getElementById('homeView').classList.remove('active');
      document.getElementById('exerciseView').classList.add('active');
      document.getElementById('headerTitle').textContent = group.name;
      document.getElementById('backBtn').classList.add('visible');
    }

    // ── Go Back ──
    function goHome() {
      document.getElementById('exerciseView').classList.remove('active');
      document.getElementById('homeView').classList.add('active');
      document.getElementById('headerTitle').textContent = 'My Trainer 💪';
      document.getElementById('backBtn').classList.remove('visible');
      currentMuscleKey = null;
    }

    // ── Open Modal ──
    function openModal(ex, muscleName) {
      currentExerciseName = ex.name;

      document.getElementById('modalTitle').textContent = ex.name;
      document.getElementById('modalTag').textContent = muscleName;
      document.getElementById('modalDesc').textContent = ex.desc;
      document.getElementById('modalSets').textContent = ex.sets;
      document.getElementById('modalTips').innerHTML = ex.tips.map(t => `<li>${t}</li>`).join('');

      // Load last session
      const log = getLog(ex.name);
      const valEl = document.getElementById('lastSessionValue');
      const dateEl = document.getElementById('lastSessionDate');
      if (log) {
        valEl.textContent = `${log.weight} kg × ${log.reps} reps`;
        valEl.className = 'ls-value';
        dateEl.textContent = log.date;
        document.getElementById('logWeight').value = log.weight;
        document.getElementById('logReps').value = log.reps;
      } else {
        valEl.textContent = 'No data yet — log below';
        valEl.className = 'ls-value none';
        dateEl.textContent = '';
        document.getElementById('logWeight').value = '';
        document.getElementById('logReps').value = '';
      }

      // Reset save button
      const btn = document.getElementById('saveBtn');
      btn.textContent = 'Save';
      btn.style.background = '';

      document.getElementById('ytBtn').onclick = () => {
        window.open('https://www.youtube.com/results?search_query=' + encodeURIComponent(ex.yt), '_blank');
      };

      document.getElementById('modalOverlay').classList.add('open');
    }

    // ── Save Log ──
    function saveLog() {
      const weight = document.getElementById('logWeight').value.trim();
      const reps = document.getElementById('logReps').value.trim();
      if (!weight && !reps) return;

      saveLogData(currentExerciseName, weight || '—', reps || '—');

      // Update last session display
      const log = getLog(currentExerciseName);
      document.getElementById('lastSessionValue').textContent = `${log.weight} kg × ${log.reps} reps`;
      document.getElementById('lastSessionValue').className = 'ls-value';
      document.getElementById('lastSessionDate').textContent = log.date;

      // Update exercise list item in background
      if (currentMuscleKey) showExercises(currentMuscleKey);

      // Show feedback
      const btn = document.getElementById('saveBtn');
      btn.textContent = '✓ Saved!';
      btn.style.background = '#27ae60cc';
      setTimeout(() => {
        btn.textContent = 'Save';
        btn.style.background = '';
      }, 1800);
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('open');
    }

    function handleOverlayClick(e) {
      if (e.target === document.getElementById('modalOverlay')) closeModal();
    }

    buildHome();
  </script>
